<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Student Management System</h1>
      <p>Manage your student records with ease</p>
    </header>

    <div class="main-content">
      <!-- Add/Edit Student Form -->
      <section class="form-section">
        <h2>Add/Edit Student</h2>
        <form id="studentForm" class="student-form">
          <input type="hidden" id="studentId">
          
          <div class="form-group">
            <label for="firstName">First Name *</label>
            <input 
              type="text" 
              id="firstName" 
              placeholder="Enter first name" 
              required
            >
          </div>

          <div class="form-group">
            <label for="lastName">Last Name *</label>
            <input 
              type="text" 
              id="lastName" 
              placeholder="Enter last name" 
              required
            >
          </div>

          <div class="form-group">
            <label for="email">Email *</label>
            <input 
              type="email" 
              id="email" 
              placeholder="Enter email address" 
              required
            >
          </div>

          <div class="form-group">
            <label for="course">Course *</label>
            <input 
              type="text" 
              id="course" 
              placeholder="Enter course name" 
              required
            >
          </div>

          <div class="form-group">
            <label for="enrolledDate">Enrolled Date</label>
            <input 
              type="date" 
              id="enrolledDate"
            >
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn btn-primary">Submit</button>
            <button type="reset" class="btn btn-secondary">Clear</button>
            <button type="button" class="btn btn-cancel" id="cancelBtn" style="display: none;">Cancel Edit</button>
          </div>
        </form>
      </section>

      <!-- Students List -->
      <section class="list-section">
        <div class="list-header">
          <h2>Students List</h2>
          <div class="search-bar">
            <input 
              type="text" 
              id="searchInput" 
              placeholder="Search by name or email..." 
              class="search-input"
            >
          </div>
        </div>

        <div id="loadingSpinner" class="loading" style="display: none;">
          <div class="spinner"></div>
          <p>Loading students...</p>
        </div>

        <div id="studentsContainer" class="students-grid">
          <!-- Students will be loaded here -->
        </div>

        <div id="emptyState" class="empty-state">
          <p>📖 No students found. Add one to get started!</p>
        </div>
      </section>
    </div>

    <!-- Alert Messages -->
    <div id="alertContainer"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
